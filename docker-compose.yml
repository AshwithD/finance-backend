version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ashwith
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # data persists across restarts

  api:
    build: .                    # build from your Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db                      # wait for db to start first
    environment:
      DATABASE_URL: postgresql://postgres:ashwith@db:5432/finance_db
      SECRET_KEY: asdfghjkl
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:


redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"